<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Career Gap Analyzer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f7fa;
  color: #1a1a2e;
  font-size: 15px;
  line-height: 1.6;
}

.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* Header */
header { margin-bottom: 40px; }

.badge {
  display: inline-block;
  background: #e8f0fe;
  color: #2563eb;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  margin-bottom: 12px;
}

h1 { font-size: 26px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
.subtitle { color: #64748b; font-size: 14px; }

/* Card */
.card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 28px;
  margin-bottom: 20px;
}

.card-title {
  font-size: 11px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 20px;
}

/* Form */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

@media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 6px; }
.field.full { grid-column: 1 / -1; }

label { font-size: 13px; font-weight: 500; color: #374151; }

input[type="text"],
input[type="number"],
input[type="file"] {
  background: #f9fafb;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 14px;
  color: #111827;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}

input:focus { border-color: #2563eb; background: #fff; }
input[type="file"] { cursor: pointer; color: #6b7280; padding: 8px 12px; }

.checkbox-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 6px;
  padding: 12px 14px;
  margin-bottom: 20px;
  cursor: pointer;
}

.checkbox-row input[type="checkbox"] {
  width: 16px; height: 16px;
  margin-top: 2px;
  accent-color: #2563eb;
  flex-shrink: 0;
}

.checkbox-row span { font-size: 13px; color: #374151; line-height: 1.5; }
.checkbox-row strong { color: #92400e; }

/* Button */
.btn {
  width: 100%;
  padding: 13px;
  background: #2563eb;
  color: #fff;
  font-size: 15px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
}

.btn:hover { background: #1d4ed8; }
.btn:disabled { background: #93c5fd; cursor: not-allowed; }

/* Error */
.error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 6px;
  padding: 12px 14px;
  color: #dc2626;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

/* Loader */
#loader { text-align: center; padding: 48px 0; display: none; }

.spinner {
  width: 36px; height: 36px;
  border: 3px solid #e2e8f0;
  border-top-color: #2563eb;
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  margin: 0 auto 14px;
}

.loader-msg { font-size: 13px; color: #64748b; }

/* Result cards */
.result-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 24px 28px;
  margin-bottom: 16px;
}

.result-card-title {
  font-size: 11px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 16px;
}

/* Tags */
.tags { display: flex; flex-wrap: wrap; gap: 8px; }

.tag {
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  color: #1d4ed8;
  font-size: 12px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 100px;
}

.tag.missing  { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
.tag.required { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }

/* Feasibility */
.feas-badge {
  display: inline-block;
  font-size: 16px;
  font-weight: 700;
  padding: 8px 18px;
  border-radius: 8px;
  margin-bottom: 16px;
}

.badge-low    { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.badge-medium { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
.badge-high   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

.stats { display: flex; gap: 12px; flex-wrap: wrap; }

.stat {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 10px 16px;
  min-width: 110px;
}

.stat-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
.stat-value { font-size: 20px; font-weight: 700; color: #0f172a; }

/* ── ALTERNATIVE ROLE CARDS (clickable) ── */
.alt-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 10px;
  gap: 12px;
  flex-wrap: wrap;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  text-decoration: none;
  color: inherit;
}

.alt-item:hover {
  border-color: #2563eb;
  background: #eff6ff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.1);
}

.alt-item:hover .alt-name { color: #2563eb; }

.alt-left { flex: 1; min-width: 160px; }
.alt-name { font-size: 14px; font-weight: 600; color: #0f172a; margin-bottom: 2px; transition: color 0.15s; }
.alt-gap  { font-size: 12px; color: #64748b; }

.alt-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; min-width: 120px; }

.bar-wrap { width: 120px; }
.bar-bg   { background: #e2e8f0; border-radius: 100px; height: 6px; }
.bar-fill { height: 6px; border-radius: 100px; background: #2563eb; }
.bar-pct  { font-size: 12px; color: #2563eb; font-weight: 600; text-align: right; margin-top: 3px; }

.alt-cta {
  font-size: 11px;
  font-weight: 600;
  color: #2563eb;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 4px;
  padding: 3px 8px;
  white-space: nowrap;
}

.alt-item:hover .alt-cta {
  background: #2563eb;
  color: #fff;
  border-color: #2563eb;
}

/* Decision box */
.decision-box {
  border-radius: 8px;
  padding: 16px 18px;
  font-size: 14px;
  line-height: 1.6;
  color: #374151;
}

.decision-box.continue { background: #eff6ff; border: 1px solid #bfdbfe; }
.decision-box.switch   { background: #f0fdf4; border: 1px solid #bbf7d0; }
.decision-box strong   { display: block; font-size: 15px; color: #0f172a; margin-bottom: 4px; }

/* Roadmap */
.week {
  padding-left: 20px;
  border-left: 2px solid #e2e8f0;
  margin-bottom: 24px;
  position: relative;
}

.week::before {
  content: '';
  position: absolute;
  left: -5px; top: 5px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #2563eb;
}

.week-label { font-size: 11px; color: #2563eb; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; }
.week-skill { font-size: 15px; font-weight: 600; color: #0f172a; margin: 2px 0 4px; }
.week-resource { font-size: 12px; color: #64748b; margin-bottom: 10px; }
.week-resource span { font-weight: 500; color: #374151; }

.day-item { display: flex; gap: 10px; margin-bottom: 6px; font-size: 13px; color: #374151; }

.day-label {
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
  border-radius: 4px;
  padding: 1px 7px;
  white-space: nowrap;
  align-self: flex-start;
  margin-top: 1px;
}

/* Analysing banner shown during alt-role re-run */
.reanalysing-note {
  font-size: 13px;
  color: #2563eb;
  background: #eff6ff;
  border: 1px solid #bfdbfe;
  border-radius: 6px;
  padding: 10px 14px;
  margin-bottom: 16px;
  display: none;
}

footer { text-align: center; padding-top: 40px; font-size: 12px; color: #cbd5e1; }

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">Career Gap Analyzer</div>
    <h1>Career Decision System</h1>
    <p class="subtitle">Upload your resume, enter your target role, and get a realistic feasibility report with a personalised learning roadmap.</p>
  </header>

  <!-- Input Form -->
  <div class="card" id="form-card">
    <div class="card-title">Your Details</div>

    <div class="form-row">
      <div class="field full">
        <label for="resume">Resume (PDF)</label>
        <input type="file" id="resume" accept=".pdf" />
      </div>
      <div class="field">
        <label for="role">Target Role</label>
        <input type="text" id="role" placeholder="e.g. Data Scientist" />
      </div>
      <div class="field">
        <label for="months">Time Available (months)</label>
        <input type="number" id="months" value="6" min="1" max="60" />
      </div>
    </div>

    <label class="checkbox-row" for="force_continue">
      <input type="checkbox" id="force_continue" />
      <span><strong>Still want to pursue this role even if not feasible</strong> — show me the full roadmap regardless.</span>
    </label>

    <div class="error" id="error-box"></div>
    <div class="reanalysing-note" id="reanalysing-note">🔄 Re-analysing for <strong id="reanalysing-role"></strong>…</div>

    <button class="btn" id="submit-btn" onclick="runAnalysis()">Analyse My Career Path</button>
  </div>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-msg" id="loader-msg">Analysing your resume…</div>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <footer>Career Gap Analyzer — Career Intelligence System</footer>
</div>

<script>
// ── keep a reference to the last uploaded file so alt-role clicks can reuse it
let lastFile = null;

const msgs = [
  "Parsing your resume…",
  "Extracting skills…",
  "Matching role requirements…",
  "Running feasibility check…",
  "Building your roadmap…"
];
let msgInterval;

function startLoader() {
  document.getElementById('loader').style.display = 'block';
  document.getElementById('results').innerHTML = '';
  let i = 0;
  document.getElementById('loader-msg').textContent = msgs[0];
  msgInterval = setInterval(() => {
    i = (i + 1) % msgs.length;
    document.getElementById('loader-msg').textContent = msgs[i];
  }, 1100);
}

function stopLoader() {
  clearInterval(msgInterval);
  document.getElementById('loader').style.display = 'none';
}

function showError(msg) {
  const b = document.getElementById('error-box');
  b.textContent = msg;
  b.style.display = 'block';
}

function hideError() { document.getElementById('error-box').style.display = 'none'; }

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Main analysis runner ─────────────────
async function runAnalysis(overrideRole) {
  hideError();
  document.getElementById('reanalysing-note').style.display = 'none';

  const file   = overrideRole ? lastFile : document.getElementById('resume').files[0];
  const role   = overrideRole || document.getElementById('role').value.trim();
  const months = document.getElementById('months').value;
  const force  = document.getElementById('force_continue').checked;

  if (!file)  { showError('Please upload your resume (PDF).'); return; }
  if (!role)  { showError('Please enter your target role.'); return; }

  // Store file for future alt-role clicks
  if (!overrideRole) lastFile = file;

  // If triggered from alt-role click, update the role field
  if (overrideRole) {
    document.getElementById('role').value = overrideRole;
    const note = document.getElementById('reanalysing-note');
    document.getElementById('reanalysing-role').textContent = overrideRole;
    note.style.display = 'block';
    // Scroll form into view
    document.getElementById('form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    await new Promise(r => setTimeout(r, 400)); // small delay so user sees the note
    note.style.display = 'none';
  }

  const fd = new FormData();
  fd.append('resume', file);
  fd.append('role', role);
  fd.append('months', months);
  fd.append('force_continue', force ? 'true' : 'false');

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  startLoader();

  try {
    const res  = await fetch('/analyze', { method: 'POST', body: fd });
    const data = await res.json();
    stopLoader();
    btn.disabled = false;
    if (data.error) { showError(data.error); return; }
    renderResults(data);
  } catch(e) {
    stopLoader();
    btn.disabled = false;
    showError('Something went wrong. Please try again.');
  }
}

// ── Render results ───────────────────────
function renderResults(d) {
  const el = document.getElementById('results');
  const fl = d.feasibility.level;
  const badgeClass  = { low: 'badge-low', medium: 'badge-medium', high: 'badge-high' }[fl];
  const statusIcon  = { low: '✅', medium: '⚠️', high: '🚫' }[fl];
  let html = '';

  // ── 1. Detected Skills
  html += `<div class="result-card">
    <div class="result-card-title">Skills Detected from Resume</div>
    <div class="tags">
      ${d.detected_skills.map(s => `<span class="tag">${esc(s)}</span>`).join('')}
    </div>
  </div>`;

  // ── 2. Feasibility
  html += `<div class="result-card">
    <div class="result-card-title">Feasibility Analysis — ${esc(d.role)}</div>
    <div class="feas-badge ${badgeClass}">${statusIcon} ${esc(d.feasibility.status)}</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Skills Missing</div>
        <div class="stat-value">${d.feasibility.gap_count}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Est. Time Needed</div>
        <div class="stat-value">${d.feasibility.months_needed} mo</div>
      </div>
      <div class="stat">
        <div class="stat-label">Your Timeline</div>
        <div class="stat-value">${d.available_months} mo</div>
      </div>
      <div class="stat">
        <div class="stat-label">Achievable?</div>
        <div class="stat-value" style="color:${d.feasibility.within_time ? '#15803d' : '#dc2626'}">
          ${d.feasibility.within_time ? 'Yes ✓' : 'No ✗'}
        </div>
      </div>
    </div>

    ${d.missing_skills.length ? `
      <div style="margin-top:18px;">
        <div class="result-card-title" style="margin-bottom:8px;">Skills You Need to Build</div>
        <div class="tags">
          ${d.missing_skills.map(s => `<span class="tag missing">✗ ${esc(s)}</span>`).join('')}
        </div>
      </div>` : `<p style="margin-top:14px;color:#15803d;font-size:14px;font-weight:600;">
        🎉 You already have all the required skills — start applying!
      </p>`}

    ${d.required_skills.length ? `
      <div style="margin-top:16px;">
        <div class="result-card-title" style="margin-bottom:8px;">Full Requirements for Role</div>
        <div class="tags">
          ${d.required_skills.map(s => `<span class="tag required">${esc(s)}</span>`).join('')}
        </div>
      </div>` : ''}
  </div>`;

  // ── 3. Decision banner (high gap only)
  if (d.decision === 'continue') {
    html += `<div class="result-card">
      <div class="result-card-title">Your Decision</div>
      <div class="decision-box continue">
        <strong>💪 Committed — full roadmap below.</strong>
        You'll need ~${d.feasibility.months_needed} months of focused learning. That's realistic if you put in 2–3 hours daily. 
        Start with the highest-weighted missing skills and don't skip the projects.
      </div>
    </div>`;
  } else if (d.decision === 'switch') {
    html += `<div class="result-card">
      <div class="result-card-title">Recommendation</div>
      <div class="decision-box switch">
        <strong>🌱 Start with a closer role — build your way up.</strong>
        The gap is large and ${d.feasibility.months_needed} months is a long commitment before you can apply. 
        The roles below match your current skills much better. Click any one to see its full roadmap.
      </div>
    </div>`;
  }

  // ── 4. Alternative Roles (clickable)
  if (d.alternatives && d.alternatives.length) {
    html += `<div class="result-card">
      <div class="result-card-title">Alternative Roles — Click to Analyse</div>
      ${d.alternatives.map(a => `
        <div class="alt-item" onclick="runAnalysis('${esc(a.role)}')" title="Analyse for ${esc(a.role)}">
          <div class="alt-left">
            <div class="alt-name">${esc(a.role)}</div>
            <div class="alt-gap">${a.missing_count === 0 ? '✅ Ready to apply' : `${a.missing_count} skill(s) to learn`}</div>
          </div>
          <div class="alt-right">
            <div class="bar-wrap">
              <div class="bar-bg">
                <div class="bar-fill" style="width:${a.match_pct}%"></div>
              </div>
              <div class="bar-pct">${a.match_pct}% match</div>
            </div>
            <span class="alt-cta">Analyse →</span>
          </div>
        </div>
      `).join('')}
      <p style="font-size:12px;color:#94a3b8;margin-top:8px;">Click any role to re-run the full analysis for that target.</p>
    </div>`;
  }

  // ── 5. Roadmap
  if (d.roadmap && d.roadmap.length) {
    html += `<div class="result-card">
      <div class="result-card-title">Weekly Learning Roadmap — ${d.roadmap.length} weeks</div>
      ${d.roadmap.map(w => `
        <div class="week">
          <div class="week-label">Week ${w.week}</div>
          <div class="week-skill">${esc(w.skill.charAt(0).toUpperCase() + w.skill.slice(1))}</div>
          <div class="week-resource">📚 <span>${esc(w.resource)}</span></div>
          ${w.days.map(day => `
            <div class="day-item">
              <span class="day-label">${esc(day.day)}</span>
              <span>${esc(day.task)}</span>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>`;
  }

  el.innerHTML = html;
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Allow Enter to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON' &&
      !document.getElementById('submit-btn').disabled) {
    runAnalysis();
  }
});
</script>
</body>
</html>
